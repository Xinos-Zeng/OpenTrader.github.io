<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="OpenTrader 量化交易平台">
  <meta name="theme-color" content="#10B981">
  <title>OpenTrader</title>
  <script>
    // GitHub Pages SPA 路由恢复
    // 从 URL 参数中读取 404.html 传来的原始路径
    (function() {
      var params = new URLSearchParams(window.location.search);
      var redirectPath = params.get('p');
      
      if (redirectPath) {
        // 解码路径
        var decodedPath = decodeURIComponent(redirectPath);
        
        // 使用 History API 恢复原始路径（不刷新页面）
        window.history.replaceState(null, '', '/' + decodedPath);
      }
    })();
  </script>
</head>
<body>
  <noscript>您需要启用JavaScript才能运行此应用。</noscript>
  <div id="root"></div>
</body>
</html>
