<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenTrader</title>
  <script>
    // GitHub Pages SPA 404 重定向
    // 当访问不存在的路径时（如刷新 /dashboard），GitHub Pages 会显示此 404 页面
    // 我们将完整路径信息存储到 sessionStorage，然后重定向到首页
    // 首页会读取并恢复原始路径
    
    (function() {
      var loc = window.location;
      
      // 获取完整路径（包括子路径）
      var fullPath = loc.pathname + loc.search + loc.hash;
      
      // 如果已经在首页，不做处理
      if (fullPath === '/' || fullPath === '/index.html') {
        return;
      }
      
      // 存储完整路径到 sessionStorage
      sessionStorage.setItem('spa_redirect_path', fullPath);
      
      // 重定向到首页
      loc.replace(loc.origin + '/');
    })();
  </script>
</head>
<body>
  <noscript>正在重定向...</noscript>
</body>
</html>
