<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>OpenTrader</title>
  <script type="text/javascript">
    // 使用 HashRouter 后，404 页面只需简单重定向到首页
    // GitHub Pages 会处理带 # 的 URL，不会触发 404
    // 这个文件只在用户直接访问不存在的路径时触发（如旧书签）
    
    // 获取当前路径，转换为 hash 路由格式
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    
    // 提取项目名后的路径部分
    // 例如: /OpenTrader.github.io/dashboard -> /dashboard
    var pathParts = path.split('/');
    var repoIndex = pathParts.findIndex(function(p) { 
      return p.toLowerCase().includes('opentrader'); 
    });
    var routePath = repoIndex >= 0 ? '/' + pathParts.slice(repoIndex + 1).join('/') : path;
    
    // 重定向到首页，使用 hash 路由
    var basePath = repoIndex >= 0 ? '/' + pathParts.slice(0, repoIndex + 1).join('/') : '';
    var newUrl = window.location.origin + basePath + '/#' + routePath + search + hash;
    
    window.location.replace(newUrl);
  </script>
</head>
<body>
  <h2>正在重定向...</h2>
</body>
</html>
