<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenTrader</title>
  <script>
    // GitHub Pages SPA 重定向
    // 将当前路径存储到 sessionStorage，然后重定向到首页
    // 首页的脚本会读取这个路径并使用 History API 恢复
    var pathSegmentsToKeep = 0; // GitHub Pages 项目页面设为1，用户页面设为0
    
    var l = window.location;
    var repo = l.pathname.split('/')[1]; // 获取仓库名
    
    // 存储完整路径（不包括仓库名前缀）
    var redirectPath = l.pathname.slice(1);
    
    // 对于 user.github.io 类型的仓库，直接存储路径
    sessionStorage.setItem('redirect', redirectPath + l.search + l.hash);
    
    // 重定向到首页
    l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/');
  </script>
</head>
<body>
</body>
</html>
